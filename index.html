<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - UAM</title>

<link rel="stylesheet" href="css/estilos.css">
<link rel="stylesheet" href="css/colores.css">

</head>

<body>

<div class="container">

  <!-- LADO IZQUIERDO -->
  <div class="left">
    <img src="img/unispace_logo.png" class="logo">
  </div>

  <!-- LADO DERECHO -->
  <div class="right">

    <h2>Bienvenido</h2>

    <div class="card">

      <h3>Iniciar sesión</h3>

      <input type="email" placeholder="Correo electrónico" id="correo">
      <input type="password" placeholder="Contraseña" id="password">

      <div class="links">
        <a href="recuperar.html">¿Olvidó su contraseña?</a>
      </div>

      <button onclick="login()">Ingresar</button>

      <p class="registro">
        ¿No tienes cuenta?
        <a href="registro.html">Crea una</a>
      </p>

    </div>

  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
