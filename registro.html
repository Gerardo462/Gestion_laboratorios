<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - UAM</title>
    <link rel="stylesheet" href="css/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/rg.css">
    <link rel="shortcut icon" href="img/unispace.png" type="image/x-icon">
</head>
<body class="d-flex align-items-center min-vh-100 bg_c">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="card p-4 p-md-5">
                    <h2 class="text-center mb-4 fw-bold text-primary">REGISTRO</h2>
                    
                    <form id="registroForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope-fill me-2 text-primary"></i>Correo Institucional
                            </label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="ejemplo@institucion.edu" required>
                        </div>

                        <div class="mb-3">
                            <label for="nombre" class="form-label">
                                <i class="bi bi-person-fill me-2 text-primary"></i>Nombre
                            </label>
                            <input type="text" class="form-control form-control-lg" id="nombre" placeholder="Tu nombre completo" required>
                        </div>

                        <div class="mb-3">
                            <label for="matricula" class="form-label">
                                <i class="bi bi-card-text me-2 text-primary"></i>Matrícula
                            </label>
                            <input type="text" class="form-control form-control-lg" id="matricula" placeholder="Tu número de matrícula" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock-fill me-2 text-primary"></i>Contraseña
                            </label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="Crea una contraseña" required>
                            
                            <div class="password-requirements mt-3">
                                <ul class="mb-0">
                                    <li>8 caracteres mínimo</li>
                                    <li>Al menos 1 número</li>
                                    <li>Al menos 1 símbolo</li>
                                    <li>Al menos 1 mayúscula</li>
                                </ul>
                            </div>
                        </div>

                        <div id="mensajeRegistro" class="alert d-none" role="alert"></div>

                        <button type="submit" class="btn btn-register w-100 btn-lg">
                            <i class="bi bi-check-circle-fill me-2"></i>Registrar
                        </button>

                        <div class="text-center mt-3">
                            <a href="index.html">Volver al inicio</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
